# Nginx site config — mysticsaudit.automystics.tech
# Install:
#   sudo cp nginx/mysticsaudit.automystics.tech.conf \
#        /etc/nginx/sites-available/mysticsaudit.automystics.tech
#   sudo ln -s /etc/nginx/sites-available/mysticsaudit.automystics.tech \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d mysticsaudit.automystics.tech

server {
    listen 80;
    listen [::]:80;
    server_name mysticsaudit.automystics.tech;

    # Redirect all HTTP → HTTPS (uncomment after certbot sets up SSL)
    # return 301 https://$host$request_uri;

    root /home/automystics-mysticsaudit/htdocs/mysticsaudit.automystics.tech/artifacts/mystics-audit/dist/public;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Body size limit (for document uploads)
        client_max_body_size 25M;
    }

    # ── Uploaded files ────────────────────────────────────────────────────────
    location /uploads/ {
        alias /home/automystics-mysticsaudit/htdocs/mysticsaudit.automystics.tech/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend SPA — all other paths serve index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mysticsaudit-access.log;
    error_log  /var/log/nginx/mysticsaudit-error.log;
}

