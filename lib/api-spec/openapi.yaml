components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # DASHBOARD
    DashboardSummary:
      type: object
      properties:
        revenueMtd: { type: number }
        revenueYtd: { type: number }
        revenueTarget: { type: number }
        collectionEfficiency: { type: number }
        grossMarginPct: { type: number }
        dso: { type: number }
        overdueReceivables: { type: number }
        overdueInvoicesCount: { type: integer }
        totalInvoicesCount: { type: integer }
        totalCashBank: { type: number }
        gstNetPayable: { type: number }
        budgetUtilizationPct: { type: number }
        inventoryTurnover: { type: number }
        pendingBillsAmount: { type: number }
        pendingBillsCount: { type: integer }
        pendingExpensesAmount: { type: number }
        pendingExpensesCount: { type: integer }
        totalCustomers: { type: integer }
        totalVendors: { type: integer }
        revenueChart: { type: array, items: { $ref: "#/components/schemas/MonthlyValue" } }
        expenseChart: { type: array, items: { $ref: "#/components/schemas/MonthlyValue" } }
      required: [revenueMtd, collectionEfficiency, grossMarginPct, totalCashBank]

    MonthlyValue:
      type: object
      properties:
        month: { type: string }
        value: { type: number }
      required: [month, value]

    CashflowSummary:
      type: object
      properties:
        totalBalance: { type: number }
        accounts: { type: array, items: { $ref: "#/components/schemas/BankBalanceItem" } }
        inflows30Days: { type: number }
        outflows30Days: { type: number }
      required: [totalBalance, accounts]

    BankBalanceItem:
      type: object
      properties:
        accountName: { type: string }
        bankName: { type: string }
        balance: { type: number }
        accountType: { type: string }
      required: [accountName, balance]

    GstFilingStatus:
      type: object
      properties:
        currentPeriod: { type: string }
        gstr1DueDate: { type: string }
        gstr1Filed: { type: boolean }
        gstr3bDueDate: { type: string }
        gstr3bFiled: { type: boolean }
        itcBalance: { $ref: "#/components/schemas/ItcBalance" }
        filingHistory: { type: array, items: { $ref: "#/components/schemas/FilingHistoryItem" } }
      required: [currentPeriod, gstr1DueDate, gstr3bDueDate]

    ItcBalance:
      type: object
      properties:
        cgst: { type: number }
        sgst: { type: number }
        igst: { type: number }
        total: { type: number }
      required: [cgst, sgst, igst, total]

    FilingHistoryItem:
      type: object
      properties:
        period: { type: string }
        gstr1Filed: { type: boolean }
        gstr3bFiled: { type: boolean }
        filedDate: { type: ["string", "null"] }
      required: [period, gstr1Filed, gstr3bFiled]

    AgingSummary:
      type: object
      properties:
        receivables: { $ref: "#/components/schemas/AgingBuckets" }
        payables: { $ref: "#/components/schemas/AgingBuckets" }
      required: [receivables, payables]

    AgingBuckets:
      type: object
      properties:
        current: { type: number }
        days0to30: { type: number }
        days31to60: { type: number }
        days61to90: { type: number }
        days91to180: { type: number }
        days180plus: { type: number }
        total: { type: number }
      required: [current, days0to30, days31to60, days61to90, days91to180, days180plus, total]

    ActivityItem:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        description: { type: string }
        amount: { type: ["number", "null"] }
        party: { type: ["string", "null"] }
        timestamp: { type: string }
        refNo: { type: ["string", "null"] }
        status: { type: string }
      required: [id, type, description, timestamp, status]

    # COMPANY
    Company:
      type: object
      properties:
        id: { type: integer }
        legalName: { type: string }
        tradeName: { type: ["string", "null"] }
        pan: { type: ["string", "null"] }
        cin: { type: ["string", "null"] }
        gstin: { type: ["string", "null"] }
        companyType: { type: string }
        industry: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        pincode: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        fiscalYearStart: { type: string }
        gstFilingFrequency: { type: string }
        createdAt: { type: string }
      required: [id, legalName, companyType, fiscalYearStart, gstFilingFrequency, createdAt]

    CompanyInput:
      type: object
      properties:
        legalName: { type: string }
        tradeName: { type: string }
        pan: { type: string }
        cin: { type: string }
        gstin: { type: string }
        companyType: { type: string }
        industry: { type: string }
        phone: { type: string }
        email: { type: string }
        website: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        pincode: { type: string }
        fiscalYearStart: { type: string }
        gstFilingFrequency: { type: string }
      required: [legalName, companyType]

    CompanyUpdate:
      type: object
      properties:
        legalName: { type: string }
        tradeName: { type: string }
        phone: { type: string }
        email: { type: string }
        website: { type: string }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        pincode: { type: string }
        gstFilingFrequency: { type: string }

    # ACCOUNT
    Account:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        type: { type: string }
        group: { type: string }
        subGroup: { type: ["string", "null"] }
        normalBalance: { type: string }
        isParty: { type: boolean }
        isBank: { type: boolean }
        isCash: { type: boolean }
        isActive: { type: boolean }
        openingBalance: { type: number }
        currentBalance: { type: number }
        description: { type: ["string", "null"] }
      required: [id, code, name, type, group, normalBalance, isParty, isBank, isCash, isActive, openingBalance, currentBalance]

    AccountInput:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        type: { type: string }
        group: { type: string }
        subGroup: { type: string }
        normalBalance: { type: string }
        isParty: { type: boolean }
        isBank: { type: boolean }
        isCash: { type: boolean }
        openingBalance: { type: number }
        description: { type: string }
      required: [code, name, type, group, normalBalance]

    AccountUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        isActive: { type: boolean }

    AccountLedger:
      type: object
      properties:
        account: { $ref: "#/components/schemas/Account" }
        openingBalance: { type: number }
        closingBalance: { type: number }
        totalDebit: { type: number }
        totalCredit: { type: number }
        entries: { type: array, items: { $ref: "#/components/schemas/LedgerEntry" } }
      required: [account, openingBalance, closingBalance, totalDebit, totalCredit, entries]

    LedgerEntry:
      type: object
      properties:
        id: { type: integer }
        date: { type: string }
        voucherNo: { type: string }
        narration: { type: ["string", "null"] }
        debit: { type: number }
        credit: { type: number }
        balance: { type: number }
        type: { type: string }
      required: [id, date, voucherNo, debit, credit, balance, type]

    TrialBalance:
      type: object
      properties:
        asOf: { type: string }
        totalDebit: { type: number }
        totalCredit: { type: number }
        isBalanced: { type: boolean }
        lines: { type: array, items: { $ref: "#/components/schemas/TrialBalanceLine" } }
      required: [asOf, totalDebit, totalCredit, isBalanced, lines]

    TrialBalanceLine:
      type: object
      properties:
        accountCode: { type: string }
        accountName: { type: string }
        group: { type: string }
        debit: { type: number }
        credit: { type: number }
      required: [accountCode, accountName, group, debit, credit]

    # JOURNAL ENTRY
    JournalEntry:
      type: object
      properties:
        id: { type: integer }
        voucherNo: { type: string }
        voucherType: { type: string }
        date: { type: string }
        narration: { type: ["string", "null"] }
        status: { type: string }
        totalDebit: { type: number }
        totalCredit: { type: number }
        isBalanced: { type: boolean }
        reversalOf: { type: ["integer", "null"] }
        createdAt: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/JournalLine" } }
      required: [id, voucherNo, voucherType, date, status, totalDebit, totalCredit, isBalanced, createdAt, lines]

    JournalLine:
      type: object
      properties:
        id: { type: integer }
        accountId: { type: integer }
        accountName: { type: string }
        accountCode: { type: string }
        debit: { type: number }
        credit: { type: number }
        narration: { type: ["string", "null"] }
        partyName: { type: ["string", "null"] }
        costCenter: { type: ["string", "null"] }
      required: [id, accountId, accountName, accountCode, debit, credit]

    JournalInput:
      type: object
      properties:
        voucherType: { type: string }
        date: { type: string }
        narration: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/JournalLineInput" } }
      required: [voucherType, date, lines]

    JournalLineInput:
      type: object
      properties:
        accountId: { type: integer }
        debit: { type: number }
        credit: { type: number }
        narration: { type: string }
        partyName: { type: string }
        costCenter: { type: string }
      required: [accountId, debit, credit]

    # INVOICE
    Invoice:
      type: object
      properties:
        id: { type: integer }
        invoiceNo: { type: string }
        type: { type: string }
        status: { type: string }
        date: { type: string }
        dueDate: { type: string }
        customerId: { type: integer }
        customerName: { type: string }
        customerGstin: { type: ["string", "null"] }
        placeOfSupply: { type: string }
        taxableAmount: { type: number }
        cgst: { type: number }
        sgst: { type: number }
        igst: { type: number }
        tcs: { type: number }
        totalAmount: { type: number }
        paidAmount: { type: number }
        balanceDue: { type: number }
        irn: { type: ["string", "null"] }
        ewbNo: { type: ["string", "null"] }
        poReference: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/InvoiceLine" } }
      required: [id, invoiceNo, type, status, date, dueDate, customerId, customerName, placeOfSupply, taxableAmount, cgst, sgst, igst, tcs, totalAmount, paidAmount, balanceDue, createdAt, lines]

    InvoiceLine:
      type: object
      properties:
        id: { type: integer }
        itemId: { type: ["integer", "null"] }
        description: { type: string }
        hsnSac: { type: string }
        quantity: { type: number }
        unit: { type: string }
        rate: { type: number }
        discountPct: { type: number }
        gstRate: { type: number }
        taxableValue: { type: number }
        cgst: { type: number }
        sgst: { type: number }
        igst: { type: number }
        lineTotal: { type: number }
      required: [id, description, hsnSac, quantity, unit, rate, discountPct, gstRate, taxableValue, cgst, sgst, igst, lineTotal]

    InvoiceInput:
      type: object
      properties:
        type: { type: string }
        date: { type: string }
        dueDate: { type: string }
        customerId: { type: integer }
        placeOfSupply: { type: string }
        poReference: { type: string }
        notes: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/InvoiceLineInput" } }
      required: [type, date, dueDate, customerId, placeOfSupply, lines]

    InvoiceLineInput:
      type: object
      properties:
        itemId: { type: integer }
        description: { type: string }
        hsnSac: { type: string }
        quantity: { type: number }
        unit: { type: string }
        rate: { type: number }
        discountPct: { type: number }
        gstRate: { type: number }
      required: [description, hsnSac, quantity, unit, rate, gstRate]

    InvoiceUpdate:
      type: object
      properties:
        date: { type: string }
        dueDate: { type: string }
        poReference: { type: string }
        notes: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/InvoiceLineInput" } }

    InvoiceSummary:
      type: object
      properties:
        totalDraft: { type: integer }
        totalPosted: { type: integer }
        totalOverdue: { type: integer }
        totalDraftAmount: { type: number }
        totalPostedAmount: { type: number }
        totalOverdueAmount: { type: number }
        collectedMtd: { type: number }
        invoicedMtd: { type: number }
      required: [totalDraft, totalPosted, totalOverdue, totalDraftAmount, totalPostedAmount, totalOverdueAmount, collectedMtd, invoicedMtd]

    # CUSTOMER
    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        gstin: { type: ["string", "null"] }
        pan: { type: ["string", "null"] }
        email: { type: string }
        phone: { type: string }
