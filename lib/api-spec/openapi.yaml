openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Mystics Audit — Cloud-Based Accounting & GST Compliance SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Executive dashboard and KPIs
  - name: companies
    description: Company and organization setup
  - name: accounts
    description: Chart of accounts and general ledger
  - name: journals
    description: Journal entries
  - name: invoices
    description: Sales invoices and billing
  - name: customers
    description: Customer master and accounts receivable
  - name: receipts
    description: Payment receipts
  - name: vendors
    description: Vendor master and accounts payable
  - name: bills
    description: Vendor bills and payments
  - name: bank
    description: Bank and cash management
  - name: expenses
    description: Expense management
  - name: purchases
    description: Purchase orders and GRNs
  - name: inventory
    description: Inventory and item master
  - name: gst
    description: GST compliance and returns
  - name: budgets
    description: Budget management
  - name: users
    description: User management and RBAC
  - name: audit
    description: Audit trail
  - name: reports
    description: Financial reports
  - name: audit-workspace
    description: Audit practice management — clients, tasks, compliance calendar

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get executive dashboard KPIs
      parameters:
        - { name: fy, in: query, schema: { type: string }, description: "Financial year e.g. 2024-25" }
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/cashflow:
    get:
      operationId: getDashboardCashflow
      tags: [dashboard]
      summary: Get cash and bank balances
      parameters:
        - { name: fy, in: query, schema: { type: string } }
      responses:
        "200":
          description: Cash flow overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashflowSummary"

  /dashboard/gst-status:
    get:
      operationId: getGstStatus
      tags: [dashboard]
      summary: GST filing status and due dates
      parameters:
        - { name: fy, in: query, schema: { type: string } }
      responses:
        "200":
          description: GST filing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstFilingStatus"

  /dashboard/aging-summary:
    get:
      operationId: getAgingSummary
      tags: [dashboard]
      summary: Receivables and payables aging summary
      parameters:
        - { name: fy, in: query, schema: { type: string } }
      responses:
        "200":
          description: Aging summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent transactions across all modules
      parameters:
        - { name: fy, in: query, schema: { type: string } }
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # COMPANIES
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company by ID
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # CHART OF ACCOUNTS
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List chart of accounts
      parameters:
        - { name: type, in: query, schema: { type: string } }
        - { name: group, in: query, schema: { type: string } }
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a ledger account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account with ledger entries
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Account with ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLedger"
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update account
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/trial-balance:
    get:
      operationId: getTrialBalance
      tags: [accounts]
      summary: Get trial balance for a date
      parameters:
        - { name: date, in: query, schema: { type: string } }
      responses:
        "200":
          description: Trial balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialBalance"

  # JOURNAL ENTRIES
  /journals:
    get:
      operationId: listJournals
      tags: [journals]
      summary: List journal entries
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournal
      tags: [journals]
      summary: Create journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journals/{id}:
    get:
      operationId: getJournal
      tags: [journals]
      summary: Get journal entry
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journals/{id}/post:
    post:
      operationId: postJournal
      tags: [journals]
      summary: Post (approve) a draft journal entry
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Posted journal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journals/{id}/reverse:
    post:
      operationId: reverseJournal
      tags: [journals]
      summary: Reverse a posted journal entry
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Reversal journal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  # INVOICES
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List sales invoices
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
        - { name: customerId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice (draft only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete draft invoice
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /invoices/{id}/post:
    post:
      operationId: postInvoice
      tags: [invoices]
      summary: Post invoice (generate IRN)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Posted invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/summary:
    get:
      operationId: getInvoiceSummary
      tags: [invoices]
      summary: Invoice summary by status for current month
      responses:
        "200":
          description: Invoice summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSummary"

  # CUSTOMERS
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}/aging:
    get:
      operationId: getCustomerAging
      tags: [customers]
      summary: Get customer outstanding aging
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Customer aging
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAging"

  /customers/ar-aging:
    get:
      operationId: getArAging
      tags: [customers]
      summary: Accounts receivable aging report
      responses:
        "200":
          description: AR aging summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArAgingReport"

  # PAYMENT RECEIPTS
  /receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List payment receipts
      parameters:
        - { name: customerId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Record payment receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get receipt
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  # VENDORS
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: isMsme, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorUpdate"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/ap-aging:
    get:
      operationId: getApAging
      tags: [vendors]
      summary: Accounts payable aging report
      responses:
        "200":
          description: AP aging report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApAgingReport"

  # VENDOR BILLS
  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List vendor bills
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: vendorId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorBill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create vendor bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorBillInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBill"

  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get vendor bill
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Vendor bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBill"
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update vendor bill
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorBillUpdate"
      responses:
        "200":
          description: Updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBill"

  /bills/{id}/post:
    post:
      operationId: postBill
      tags: [bills]
      summary: Post a vendor bill (creates GL journal entries)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Bill posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBill"

  /bills/{id}/pay:
    post:
      operationId: payBill
      tags: [bills]
      summary: Record payment for a vendor bill
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillPaymentInput"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorBill"

  # BANK ACCOUNTS
  /bank/accounts:
    get:
      operationId: listBankAccounts
      tags: [bank]
      summary: List bank accounts with balances
      responses:
        "200":
          description: Bank accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankAccount"
    post:
      operationId: createBankAccount
      tags: [bank]
      summary: Add bank account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"

  /bank/accounts/{id}/transactions:
    get:
      operationId: getBankTransactions
      tags: [bank]
      summary: Get bank transactions for reconciliation
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Bank transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankTransaction"
    post:
      operationId: addBankTransaction
      tags: [bank]
      summary: Add a bank transaction with automatic GL posting
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankTransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTransaction"

  /bank/transfer:
    post:
      operationId: createBankTransfer
      tags: [bank]
      summary: Transfer funds between two bank accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankTransferInput"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  fromTransaction: { $ref: "#/components/schemas/BankTransaction" }
                  toTransaction: { $ref: "#/components/schemas/BankTransaction" }
                required: [fromTransaction, toTransaction]

  /bank/accounts/{id}/reconcile:
    post:
      operationId: reconcileBankTransaction
      tags: [bank]
      summary: Match bank transaction to journal entry
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileInput"
      responses:
        "200":
          description: Reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTransaction"

  # EXPENSES
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expense claims
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of expense claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseClaim"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Submit expense claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseClaim"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense claim
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Expense claim
          content:
            application/json:
